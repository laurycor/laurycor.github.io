title: "SQL Employee Analytics Dashboard"

short_summary: >
  Developed SQL queries to analyze employee salary trends and department
  performance. Generated insights such as rankings, percent contributions,
  and running totals using advanced SQL techniques.

tech_stack:
  - SQL
  - PostgreSQL

problem_statement: >
  Organizations often store large amounts of employee and salary data,
  but extracting meaningful insights can be challenging without efficient
  query design. There was a need to better understand salary distribution
  and department-level performance.

approach: >
  Wrote SQL queries using aggregations and window functions to analyze
  employee data. Calculated metrics such as salary rankings, cumulative
  totals, and department contributions. Validated results using multiple
  query checks to ensure accuracy.

results_impact: >
  Provided clear insights into salary distribution and departmental
  performance. Demonstrated how SQL can be used to transform raw data
  into actionable business insights.

