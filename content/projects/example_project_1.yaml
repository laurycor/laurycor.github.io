title: "Luce County Timber Analysis"

short_summary: >
  Digitized and analyzed historical timber lease records (1987–2025) to
  identify revenue trends and allocation patterns. Created visualizations
  to highlight how funds were distributed across loans, maintenance, and
  reserves.

tech_stack:
  - Python
  - pandas
  - matplotlib
  - OCR

problem_statement: >
  Historical timber lease records were stored in non-digital formats,
  making it difficult to analyze long-term revenue trends and financial
  allocations. This limited transparency and accessibility for
  stakeholders.

approach: >
  Used OCR tools to extract data from scanned records and combined it
  with structured financial data. Cleaned and organized the dataset,
  then analyzed trends over time using Python. Created visualizations
  to communicate patterns in revenue and fund distribution.

results_impact: >
  Identified key revenue trends and allocation patterns across multiple
  decades. Improved accessibility of financial data and provided clear
  visual summaries to support decision-making and transparency.

